<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" fill="none">
  <defs>
    <linearGradient id="guitarBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="600" fill="#f5f5f5"/>
  <!-- Guitar Body -->
  <ellipse cx="200" cy="350" rx="120" ry="140" fill="url(#guitarBody)"/>
  <ellipse cx="200" cy="350" rx="100" ry="120" fill="#A0522D" opacity="0.6"/>
  <!-- Pickguard -->
  <path d="M 180 280 Q 160 320 165 380 L 190 390 Q 195 330 200 290 Z" fill="#f5f5dc" opacity="0.8"/>
  <!-- Pickups -->
  <rect x="170" y="320" width="60" height="15" rx="3" fill="#2c2c2c"/>
  <rect x="170" y="360" width="60" height="15" rx="3" fill="#2c2c2c"/>
  <rect x="170" y="400" width="60" height="15" rx="3" fill="#2c2c2c"/>
  <!-- Neck -->
  <rect x="185" y="50" width="30" height="250" fill="#D2691E"/>
  <rect x="185" y="50" width="30" height="250" fill="#8B4513" opacity="0.3"/>
  <!-- Frets -->
  <line x1="185" y1="80" x2="215" y2="80" stroke="#c0c0c0" stroke-width="2"/>
  <line x1="185" y1="110" x2="215" y2="110" stroke="#c0c0c0" stroke-width="2"/>
  <line x1="185" y1="140" x2="215" y2="140" stroke="#c0c0c0" stroke-width="2"/>
  <line x1="185" y1="170" x2="215" y2="170" stroke="#c0c0c0" stroke-width="2"/>
  <line x1="185" y1="200" x2="215" y2="200" stroke="#c0c0c0" stroke-width="2"/>
  <line x1="185" y1="230" x2="215" y2="230" stroke="#c0c0c0" stroke-width="2"/>
  <line x1="185" y1="260" x2="215" y2="260" stroke="#c0c0c0" stroke-width="2"/>
  <!-- Strings -->
  <line x1="195" y1="50" x2="195" y2="480" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="200" y1="50" x2="200" y2="480" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="205" y1="50" x2="205" y2="480" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Headstock -->
  <rect x="180" y="20" width="40" height="40" rx="5" fill="#8B4513"/>
  <circle cx="185" cy="30" r="3" fill="#c0c0c0"/>
  <circle cx="195" cy="30" r="3" fill="#c0c0c0"/>
  <circle cx="205" cy="30" r="3" fill="#c0c0c0"/>
  <circle cx="185" cy="45" r="3" fill="#c0c0c0"/>
  <circle cx="195" cy="45" r="3" fill="#c0c0c0"/>
  <circle cx="205" cy="45" r="3" fill="#c0c0c0"/>
  <!-- Bridge -->
  <rect x="180" y="480" width="40" height="20" rx="2" fill="#808080"/>
  <!-- Controls -->
  <circle cx="220" cy="420" r="8" fill="#2c2c2c" stroke="#c0c0c0" stroke-width="1"/>
  <circle cx="220" cy="450" r="8" fill="#2c2c2c" stroke="#c0c0c0" stroke-width="1"/>
</svg>
