<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" fill="none">
  <defs>
    <linearGradient id="pianoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="600" fill="#f0f0f0"/>
  <!-- Piano Body -->
  <rect x="20" y="220" width="360" height="160" rx="6" fill="url(#pianoGrad)"/>
  <rect x="25" y="225" width="350" height="150" rx="4" fill="#0a0a0a"/>
  <!-- Yamaha Logo -->
  <ellipse cx="200" cy="250" rx="30" ry="12" fill="#6a1b9a"/>
  <text x="200" y="255" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">YAMAHA</text>
  <!-- Model Name -->
  <text x="200" y="275" font-family="Arial" font-size="11" fill="#999" text-anchor="middle">P-125</text>
  <!-- Control Panel -->
  <rect x="280" y="240" width="80" height="30" rx="3" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <circle cx="295" cy="255" r="5" fill="#2c2c2c" stroke="#555" stroke-width="1"/>
  <circle cx="315" cy="255" r="5" fill="#2c2c2c" stroke="#555" stroke-width="1"/>
  <circle cx="335" cy="255" r="5" fill="#2c2c2c" stroke="#555" stroke-width="1"/>
  <circle cx="355" cy="255" r="5" fill="#2c2c2c" stroke="#555" stroke-width="1"/>
  <!-- White Keys -->
  <rect x="35" y="300" width="22" height="70" rx="2" fill="#fefefe" stroke="#ddd" stroke-width="1"/>
  <rect x="60" y="300" width="22" height="70" rx="2" fill="#fefefe" stroke="#ddd" stroke-width="1"/>
  <rect x="85" y="300" width="22" height="70" rx="2" fill="#fefefe" stroke="#ddd" stroke-width="1"/>
  <rect x="110" y="300" width="22" height="70" rx="2" fill="#fefefe" stroke="#ddd" stroke-width="1"/>
  <rect x="135" y="300" width="22" height="70" rx="2" fill="#fefefe" stroke="#ddd" stroke-width="1"/>
  <rect x="160" y="300" width="22" height="70" rx="2" fill="#fefefe" stroke="#ddd" stroke-width="1"/>
  <rect x="185" y="300" width="22" height="70" rx="2" fill="#fefefe" stroke="#ddd" stroke-width="1"/>
  <rect x="210" y="300" width="22" height="70" rx="2" fill="#fefefe" stroke="#ddd" stroke-width="1"/>
  <rect x="235" y="300" width="22" height="70" rx="2" fill="#fefefe" stroke="#ddd" stroke-width="1"/>
  <rect x="260" y="300" width="22" height="70" rx="2" fill="#fefefe" stroke="#ddd" stroke-width="1"/>
  <rect x="285" y="300" width="22" height="70" rx="2" fill="#fefefe" stroke="#ddd" stroke-width="1"/>
  <rect x="310" y="300" width="22" height="70" rx="2" fill="#fefefe" stroke="#ddd" stroke-width="1"/>
  <rect x="335" y="300" width="22" height="70" rx="2" fill="#fefefe" stroke="#ddd" stroke-width="1"/>
  <!-- Black Keys -->
  <rect x="51" y="300" width="16" height="45" rx="2" fill="#0a0a0a"/>
  <rect x="76" y="300" width="16" height="45" rx="2" fill="#0a0a0a"/>
  <rect x="126" y="300" width="16" height="45" rx="2" fill="#0a0a0a"/>
  <rect x="151" y="300" width="16" height="45" rx="2" fill="#0a0a0a"/>
  <rect x="176" y="300" width="16" height="45" rx="2" fill="#0a0a0a"/>
  <rect x="226" y="300" width="16" height="45" rx="2" fill="#0a0a0a"/>
  <rect x="251" y="300" width="16" height="45" rx="2" fill="#0a0a0a"/>
  <rect x="301" y="300" width="16" height="45" rx="2" fill="#0a0a0a"/>
  <rect x="326" y="300" width="16" height="45" rx="2" fill="#0a0a0a"/>
  <!-- Pedal Connection -->
  <rect x="180" y="380" width="40" height="8" rx="2" fill="#333"/>
  <!-- Stand Legs -->
  <rect x="60" y="380" width="10" height="140" fill="#2c2c2c"/>
  <rect x="330" y="380" width="10" height="140" fill="#2c2c2c"/>
  <rect x="40" y="510" width="320" height="12" rx="3" fill="#3a3a3a"/>
</svg>
