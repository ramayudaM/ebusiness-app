version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nadakita-app
    user: root
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - /var/www/html/node_modules
      - /var/www/html/vendor
      - nadakita-cache:/var/www/html/bootstrap/cache
    ports:
      - "9000:9000"
      - "5173:5173"
    environment:
      - PHP_OPCACHE_ENABLE=0
      - COMPOSER_ALLOW_SUPERUSER=1
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nadakita-network

  nginx:
    image: nginx:alpine
    container_name: nadakita-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - nadakita-network

  db:
    image: postgres:15-alpine
    container_name: nadakita-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nadakita_db
      POSTGRES_USER: nadakita
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - nadakita-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nadakita -d nadakita_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nadakita-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: nadakita-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nadakita.id
      PGADMIN_DEFAULT_PASSWORD: secret
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - nadakita-network

volumes:
  nadakita-pgdata:
  nadakita-cache:

networks:
  nadakita-network:
    driver: bridge
